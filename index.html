<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zhenbang & Jingyu Wedding</title>
    <style>
        :root {
            --primary: #c19a6b; 
            --accent: #f8f1e9;
            --text: #58514a;
            --bg: #fffcf9;
            --white: #ffffff;
            --decline: #d9d9d9;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: var(--bg); font-family: "PingFang SC", "Microsoft YaHei", sans-serif; color: var(--text); display: flex; justify-content: center; min-height: 100vh; padding: 20px 0; }
        
        .card { width: 92%; max-width: 480px; background: var(--white); padding: 40px 25px; border-radius: 35px; box-shadow: 0 20px 50px rgba(193, 154, 107, 0.12); text-align: center; border: 1px solid rgba(193, 154, 107, 0.1); height: fit-content; }
        
        .ornament { font-size: 20px; color: var(--primary); margin-bottom: 10px; display: block; opacity: 0.7; }
        h1 { font-weight: 300; letter-spacing: 2px; margin: 0; color: var(--primary); font-size: 1.6rem; }
        .ch-title { font-size: 1.4rem; margin-top: 5px; font-weight: 500; letter-spacing: 4px; }
        .subtitle { font-size: 0.75rem; color: #bbb; text-transform: uppercase; margin-bottom: 35px; margin-top: 5px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.85rem; margin-bottom: 8px; color: var(--primary); font-weight: 600; }
        
        input, select { width: 100%; height: 50px; padding: 0 15px; border: 1px solid #f0f0f0; border-radius: 15px; font-size: 16px; background: #fafafa; color: var(--text); outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(193, 154, 107, 0.05); }

        /* Fancy Accommodation Toggle Card */
        .hotel-toggle-card {
            background: var(--accent);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
            margin: 25px 0;
        }
        .hotel-toggle-card.active { border-color: var(--primary); background: #fff; }
        .hotel-toggle-card .info { text-align: left; }
        .hotel-toggle-card .info .title { font-weight: 600; color: var(--primary); display: block; }
        .hotel-toggle-card .info .desc { font-size: 0.75rem; color: #a19a94; }
        .custom-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--primary); position: relative; }
        .active .custom-check::after { content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--primary); font-weight: bold; }

        button { width: 100%; height: 55px; background: var(--primary); color: white; border: none; border-radius: 18px; font-size: 1rem; font-weight: 600; cursor: pointer; box-shadow: 0 10px 20px rgba(193, 154, 107, 0.2); transition: 0.2s; }
        button:active { transform: scale(0.97); }
        .back-link { display: inline-block; margin-top: 20px; font-size: 0.85rem; color: #bbb; cursor: pointer; text-decoration: underline; }

        /* Admin Dashboard Styles */
        .admin-section { text-align: left; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .stat-box { background: var(--accent); padding: 15px; border-radius: 15px; text-align: center; }
        .stat-box .val { font-size: 1.4rem; font-weight: bold; color: var(--primary); display: block; }
        .stat-box .lbl { font-size: 0.7rem; color: #a19a94; text-transform: uppercase; }

        .guest-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .guest-table th { text-align: left; padding: 10px 5px; color: #bbb; font-weight: 400; border-bottom: 1px solid #f0f0f0; }
        .guest-table td { padding: 12px 5px; border-bottom: 1px solid #fafafa; }
        .tag { padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
        .tag-yes { background: #eef5e9; color: #6b8e23; }
        .tag-no { background: #fdf0f0; color: #cc6666; }

        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <span class="ornament">✧ ❀ ✧</span>
    <div class="ch-title">振邦 & 静羽</div>
    <h1>Zhenbang & Jingyu</h1>
    <div class="subtitle">Wedding Celebration</div>

    <div id="step1">
        <div class="input-group">
            <label>请确认您的姓名</label>
            <input type="text" id="nameInput" placeholder="请输入姓名">
        </div>
        <button onclick="handleLogin()">确认进入</button>
    </div>

    <div id="rsvpStep" class="hidden fade-in">
        <p style="font-size: 1.1rem;">欢迎您, <strong id="userName"></strong></p>
        
        <div class="input-group">
            <label>是否出席婚礼</label>
            <select id="attending">
                <option value="yes">确认出席</option>
                <option value="no">抱歉缺席</option>
            </select>
        </div>

        <div id="detailsArea">
            <div class="input-group">
                <label>随行人数 (含本人)</label>
                <input type="number" id="count" value="1" min="1">
            </div>

            <div id="hotelCard" class="hotel-toggle-card" onclick="toggleHotel()">
                <div class="info">
                    <span class="title">需要安排住宿</span>
                    <span class="desc">勾选后请填写日期及间数</span>
                </div>
                <div class="custom-check"></div>
                <input type="checkbox" id="hotel" class="hidden">
            </div>

            <div id="hotelDates" class="hidden fade-in" style="background:#fafafa; padding:15px; border-radius:15px; margin-bottom:20px;">
                <div class="input-group">
                    <label>所需房间数量</label>
                    <input type="number" id="roomCount" value="1" min="1">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div class="input-group"><label>入住日期</label><input type="date" id="startDate"></div>
                    <div class="input-group"><label>退房日期</label><input type="date" id="endDate"></div>
                </div>
            </div>
        </div>

        <button onclick="handleSave()">提交回执</button>
        <span class="back-link" onclick="location.reload()">← 返回修改姓名</span>
    </div>

    <div id="adminStep" class="hidden fade-in">
        <div class="admin-section">
            <div class="stats-row">
                <div class="stat-box"><span class="val" id="statPeople">0</span><span class="lbl">确认出席</span></div>
                <div class="stat-box"><span class="val" id="statRooms">0</span><span class="lbl">所需房间</span></div>
            </div>
            
            <table class="guest-table">
                <thead><tr><th>宾客</th><th>状态</th><th>人数</th><th>房/晚</th></tr></thead>
                <tbody id="adminTableBody"></tbody>
            </table>
            
            <button style="margin-top:30px; background:#f4f4f4; color:#999; box-shadow:none;" onclick="location.reload()">退出管理后台</button>
        </div>
    </div>
</div>

<script>
    const clean = (n) => n.replace(/[\s\u3000]+/g, '');

    function toggleHotel() {
        const cb = document.getElementById('hotel');
        cb.checked = !cb.checked;
        updateHotelUI();
    }

    function updateHotelUI() {
        const cb = document.getElementById('hotel');
        const card = document.getElementById('hotelCard');
        const dates = document.getElementById('hotelDates');
        if(cb.checked) {
            card.classList.add('active');
            dates.classList.remove('hidden');
        } else {
            card.classList.remove('active');
            dates.classList.add('hidden');
        }
    }

    document.getElementById('attending').addEventListener('change', e => {
        document.getElementById('detailsArea').style.display = e.target.value === 'yes' ? 'block' : 'none';
    });

    async function handleLogin() {
        const nameInput = document.getElementById('nameInput').value.trim();
        const cleanName = clean(nameInput);
        if (!cleanName) return alert("请输入姓名");

        if (['zhenbang', 'jingyu'].includes(cleanName.toLowerCase())) {
            loadAdminDashboard();
            return;
        }

        const res = await fetch(`/api/rsvp?name=${encodeURIComponent(cleanName)}`);
        const data = await res.json();
        
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('rsvpStep').classList.remove('hidden');
        document.getElementById('userName').innerText = cleanName;

        if (!data.isNew) {
            document.getElementById('attending').value = data.coming ? 'yes' : 'no';
            document.getElementById('count').value = data.people || 1;
            document.getElementById('hotel').checked = data.needsHotel || false;
            document.getElementById('roomCount').value = data.roomCount || 1;
            document.getElementById('startDate').value = data.startDate || '';
            document.getElementById('endDate').value = data.endDate || '';
            document.getElementById('attending').dispatchEvent(new Event('change'));
            updateHotelUI();
        }
    }

    async function loadAdminDashboard() {
        const res = await fetch(`/api/rsvp?admin=true`);
        const allData = await res.json();
        
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('adminStep').classList.remove('hidden');

        let totalP = 0, totalR = 0;
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = '';

        allData.forEach(item => {
            if (item.coming) totalP += (item.people || 0);
            if (item.needsHotel) totalR += (item.roomCount || 0);

            const row = `<tr>
                <td>${item.name}</td>
                <td><span class="tag ${item.coming?'tag-yes':'tag-no'}">${item.coming?'出席':'缺席'}</span></td>
                <td>${item.coming ? item.people : '-'}</td>
                <td>${item.needsHotel ? (item.roomCount+'间') : '-'}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        document.getElementById('statPeople').innerText = totalP;
        document.getElementById('statRooms').innerText = totalR;
    }

    async function handleSave() {
        const name = clean(document.getElementById('nameInput').value);
        const isComing = document.getElementById('attending').value === 'yes';
        const needsHotel = document.getElementById('hotel').checked;

        const payload = {
            name: name,
            coming: isComing,
            people: isComing ? parseInt(document.getElementById('count').value) : 0,
            needsHotel: isComing && needsHotel,
            roomCount: isComing && needsHotel ? parseInt(document.getElementById('roomCount').value) : 0,
            startDate: isComing && needsHotel ? document.getElementById('startDate').value : '',
            endDate: isComing && needsHotel ? document.getElementById('endDate').value : ''
        };

        await fetch(`/api/rsvp?name=${encodeURIComponent(name)}`, { method: 'POST', body: JSON.stringify(payload) });
        alert("回执提交成功！");
    }
</script>
</body>
</html>
