<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zhenbang & Jingyu Wedding</title>
    <style>
        :root { --primary: #d4a373; --bg: #fefae0; --text: #58514a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: var(--bg); font-family: sans-serif; color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 95%; max-width: 420px; background: white; padding: 40px 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: var(--primary); font-size: 1.6rem; margin-bottom: 30px; line-height: 1.4; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.85rem; margin-bottom: 8px; font-weight: bold; color: #888; }
        input, select { width: 100%; height: 45px; padding: 0 12px; border: 1px solid #eee; border-radius: 10px; font-size: 16px; background: #fafafa; }
        .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { width: 100%; height: 50px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>Zhenbang & Jingyu<br>Wedding Celebration</h1>

    <div id="step1">
        <div class="input-group">
            <label>请确认您的姓名</label>
            <input type="text" id="nameInput" placeholder="请输入姓名">
        </div>
        <button onclick="handleCheck()">确认身份</button>
    </div>

    <div id="step2" class="hidden">
        <p>您好, <strong id="userName"></strong></p>
        
        <div class="input-group">
            <label>是否出席</label>
            <select id="attending">
                <option value="yes">确认出席</option>
                <option value="no">抱歉缺席</option>
            </select>
        </div>

        <div id="detailsArea">
            <div class="input-group">
                <label>随行人数</label>
                <input type="number" id="count" value="1" min="1">
            </div>

            <div style="text-align: left; margin: 20px 0;">
                <label style="display: flex; align-items: center; gap: 10px; color: var(--text);">
                    <input type="checkbox" id="hotel" style="width: 20px; height: 20px;"> 需要安排住宿
                </label>
            </div>

            <div id="hotelDates" class="hidden fade-in">
                <div class="date-row">
                    <div class="input-group">
                        <label>入住日期</label>
                        <input type="date" id="startDate">
                    </div>
                    <div class="input-group">
                        <label>退房日期</label>
                        <input type="date" id="endDate">
                    </div>
                </div>
            </div>
        </div>

        <button onclick="handleSave()">提交回执</button>
        <p id="msg" style="font-size: 0.8rem; color: #aaa; margin-top: 10px;"></p>
    </div>
</div>

<script>
    const clean = (n) => n.replace(/[\s\u3000]+/g, '');

    // Toggle Details Area
    document.getElementById('attending').addEventListener('change', (e) => {
        document.getElementById('detailsArea').style.display = e.target.value === 'yes' ? 'block' : 'none';
    });

    // Toggle Hotel Dates
    document.getElementById('hotel').addEventListener('change', (e) => {
        document.getElementById('hotelDates').style.display = e.target.checked ? 'block' : 'none';
    });

    async function handleCheck() {
        const name = clean(document.getElementById('nameInput').value);
        if (!name) return alert("请输入姓名");

        const res = await fetch(`/api/rsvp?name=${encodeURIComponent(name)}`);
        const data = await res.json();

        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        document.getElementById('step2').classList.add('fade-in');
        document.getElementById('userName').innerText = name;

        if (!data.isNew) {
            document.getElementById('attending').value = data.coming ? 'yes' : 'no';
            document.getElementById('count').value = data.people || 1;
            document.getElementById('hotel').checked = data.needsHotel || false;
            document.getElementById('startDate').value = data.startDate || '';
            document.getElementById('endDate').value = data.endDate || '';
            
            // Trigger UI updates
            document.getElementById('attending').dispatchEvent(new Event('change'));
            document.getElementById('hotel').dispatchEvent(new Event('change'));
            document.getElementById('msg').innerText = "提示：您之前已提交过，可以进行修改";
        }
    }

    async function handleSave() {
        const name = clean(document.getElementById('nameInput').value);
        const isComing = document.getElementById('attending').value === 'yes';
        const needsHotel = document.getElementById('hotel').checked;

        const payload = {
            coming: isComing,
            people: isComing ? parseInt(document.getElementById('count').value) : 0,
            needsHotel: isComing && needsHotel,
            startDate: isComing && needsHotel ? document.getElementById('startDate').value : '',
            endDate: isComing && needsHotel ? document.getElementById('endDate').value : ''
        };

        const res = await fetch(`/api/rsvp?name=${encodeURIComponent(name)}`, {
            method: 'POST',
            body: JSON.stringify(payload)
        });

        if (res.ok) alert("提交成功！祝您生活愉快！");
    }
</script>
</body>
</html>
