<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚礼回执</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { color: #5a5a5a; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { background: #8b5cf6; color: white; border: none; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>婚礼庆典回执</h2>
    
    <div id="loginSection">
        <input type="text" id="nameInput" placeholder="请输入您的姓名">
        <button onclick="loadRSVP()">查询 / 进入</button>
    </div>

    <div id="formSection" class="hidden">
        <p>您好, <strong id="userDisp"></strong></p>
        <label>是否出席：</label>
        <select id="attending">
            <option value="yes">出席</option>
            <option value="no">不出席</option>
        </select>
        
        <label>随行人数：</label>
        <input type="number" id="count" value="1" min="1">
        
        <label style="display:block; margin: 10px 0;">
            <input type="checkbox" id="hotel" style="width:auto;"> 需要安排住宿
        </label>
        
        <button id="saveBtn" onclick="saveRSVP()">提交更新</button>
    </div>
</div>

<script>
    const clean = (n) => n.replace(/[\s\u3000]+/g, '');

    async function loadRSVP() {
        const name = clean(document.getElementById('nameInput').value);
        if (!name) return alert("请先输入姓名");

        try {
            // Using a relative path ensures it hits Cloudflare Pages, not the old Worker
            const res = await fetch(`/api/rsvp?name=${encodeURIComponent(name)}`);
            const data = await res.json();

            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('formSection').classList.remove('hidden');
            document.getElementById('userDisp').innerText = name;

            if (!data.isNew) {
                document.getElementById('attending').value = data.coming ? 'yes' : 'no';
                document.getElementById('count').value = data.people;
                document.getElementById('hotel').checked = data.needsHotel;
            }
        } catch (e) {
            alert("加载失败，请确保您是通过 Pages 域名访问的。");
        }
    }

    async function saveRSVP() {
        const name = clean(document.getElementById('nameInput').value);
        const payload = {
            coming: document.getElementById('attending').value === 'yes',
            people: parseInt(document.getElementById('count').value),
            needsHotel: document.getElementById('hotel').checked
        };

        const res = await fetch(`/api/rsvp?name=${encodeURIComponent(name)}`, {
            method: 'POST',
            body: JSON.stringify(payload)
        });

        if (res.ok) alert("提交成功！感谢您的回复。");
        else alert("保存失败，请重试。");
    }
</script>
</body>
</html>
